services:
  agentpouch:
    build: .
    ports:
      - "8080:8080"
    environment:
      DATABASE_URL: postgres://agentpouch:agentbox@db:5432/agentpouch
      API_TOKEN: dev-token-change-me
      PUBLIC_BASE_URL: http://localhost:8080
      AUTO_MIGRATE: "true"
      STORAGE: local
      STORAGE_PATH: /data
    volumes:
      - agentpouch_data:/data
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: agentpouch
      POSTGRES_USER: agentpouch
      POSTGRES_PASSWORD: agentpouch
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U agentpouch"]
      interval: 5s
      timeout: 3s
      retries: 10
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped

volumes:
  agentpouch_data:
  postgres_data:
