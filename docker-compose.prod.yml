services:
  agentpouch:
    image: fengjiaop/agentpouch:latest
    environment:
      DATABASE_URL: postgres://agentpouch:${DB_PASSWORD}@db:5432/agentpouch
      API_TOKEN: ${API_TOKEN}
      PUBLIC_BASE_URL: https://${DOMAIN}
      AUTO_MIGRATE: "true"
      NODE_ENV: production
      STORAGE: ${STORAGE:-local}
      STORAGE_PATH: /data
      # S3 / R2 (uncomment when STORAGE=s3)
      # S3_ENDPOINT: ${S3_ENDPOINT}
      # S3_BUCKET: ${S3_BUCKET}
      # S3_REGION: ${S3_REGION:-us-east-1}
      # S3_ACCESS_KEY_ID: ${S3_ACCESS_KEY_ID}
      # S3_SECRET_ACCESS_KEY: ${S3_SECRET_ACCESS_KEY}
    volumes:
      - agentpouch_data:/data
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: agentpouch
      POSTGRES_USER: agentpouch
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U agentpouch"]
      interval: 5s
      timeout: 3s
      retries: 10
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped

  caddy:
    image: caddy:2-alpine
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - agentpouch
    restart: unless-stopped

volumes:
  agentpouch_data:
  postgres_data:
  caddy_data:
  caddy_config:
