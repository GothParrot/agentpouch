services:
  agentbox:
    image: agentbox/agentbox:latest
    ports:
      - "8080:8080"
    environment:
      DATABASE_URL: postgres://agentbox:agentbox@db:5432/agentbox
      API_TOKEN: dev-token-change-me
      PUBLIC_BASE_URL: http://localhost:8080
      AUTO_MIGRATE: "true"
      STORAGE: local
      STORAGE_PATH: /data
    volumes:
      - agentbox_data:/data
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: agentbox
      POSTGRES_USER: agentbox
      POSTGRES_PASSWORD: agentbox
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U agentbox"]
      interval: 5s
      timeout: 3s
      retries: 10
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped

volumes:
  agentbox_data:
  postgres_data:
